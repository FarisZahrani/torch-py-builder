name: Check for New PyTorch Version

on:
  schedule:
    - cron: "0 4 * * 1"  # Every Monday at 4:00 AM UTC
  workflow_dispatch:
    inputs:
      force_build:
        description: "Trigger a build even if no new version is detected."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  actions: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force --prune --prune-tags

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve latest stable PyTorch version
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/resolve_latest_torch.py --output resolved.json
          cat resolved.json

      - name: Check if release tag already exists
        id: check
        env:
          FORCE_BUILD: ${{ github.event.inputs.force_build || 'false' }}
        run: |
          set -euo pipefail

          TORCH_VERSION=$(jq -r '.version' resolved.json)
          RELEASE_TAG="torch-${TORCH_VERSION}"

          echo "torch_version=${TORCH_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists — no build needed."
            TAG_EXISTS="true"
          else
            echo "Tag ${RELEASE_TAG} not found — build needed for PyTorch ${TORCH_VERSION}."
            TAG_EXISTS="false"
          fi

          if [ "${TAG_EXISTS}" = "false" ] || [ "${FORCE_BUILD}" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger build workflow
        if: steps.check.outputs.should_build == 'true'
        env:
          TORCH_VERSION: ${{ steps.check.outputs.torch_version }}
        run: |
          set -euo pipefail

          # Always force rebuild — the tag check is the gate; the build workflow's
          # own state-file comparison would otherwise say "no changes" and skip everything.
          PAYLOAD="{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"force_rebuild\":\"true\"}}"

          curl -sS -L \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/actions/workflows/build.yml/dispatches" \
            -d "${PAYLOAD}"

          echo "Build workflow dispatched for PyTorch ${TORCH_VERSION}."
