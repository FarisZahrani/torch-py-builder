name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  resolve-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve latest stable PyTorch version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/resolve_latest_torch.py --output resolved.json
          cat resolved.json

      - name: Validate resolved version shape
        shell: python
        run: |
          import json
          from pathlib import Path

          payload = json.loads(Path("resolved.json").read_text(encoding="utf-8"))
          assert "version" in payload, "missing 'version' field"
          assert "tag" in payload, "missing 'tag' field"
          version = payload["version"]
          parts = version.split(".")
          assert len(parts) >= 2, f"version has too few parts: {version}"
          assert all(p.isdigit() for p in parts), f"non-numeric version parts: {version}"
          print(f"Resolved PyTorch version: {version}")

  script-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Compile Python scripts
        run: python -m compileall scripts

      - name: Smoke test script CLIs
        run: |
          python scripts/resolve_latest_torch.py --help
          python scripts/plan_release.py --help
          python scripts/update_release_state.py --help
          python scripts/validate_wheel.py --help
          python scripts/matrix_release_assets.py --help
          python scripts/merge_release_checksums.py --help
          python scripts/check_build_readiness.py --help
          python scripts/verify_release_bundle.py --help

  matrix-release-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate fill-missing planning against torch-2.11.0 assets
        shell: python
        run: |
          import json
          import sys
          from pathlib import Path

          sys.path.insert(0, "scripts")
          from matrix_release_assets import (
              matrix_entry_is_complete,
              select_missing_matrix_entries,
          )

          release_assets = [
              "torch-2.11.0-cp313-cp313-linux_x86_64.whl",
              "torch-2.11.0-cp313-cp313-macosx_10_15_universal2.whl",
              "torch-2.11.0-cp313-cp313-macosx_14_0_universal2.whl",
              "torchaudio-2.11.0-cp313-cp313-linux_x86_64.whl",
              "torchaudio-2.11.0-cp313-cp313-macosx_10_13_universal2.whl",
              "torchaudio-2.11.0-cp313-cp313-win_amd64.whl",
              "torchvision-0.26.0-cp313-cp313-linux_x86_64.whl",
              "torchvision-0.26.0-cp313-cp313-macosx_10_15_universal2.whl",
              "torchvision-0.26.0-cp313-cp313-macosx_11_0_universal2.whl",
              "torchvision-0.26.0-cp313-cp313-win_amd64.whl",
          ]

          matrix = json.loads(Path("config/build_matrix.json").read_text(encoding="utf-8"))
          cpu_entries = []
          for target in matrix["targets"]:
              if target.get("backend") == "cuda":
                  continue
              for py_version in matrix["python_versions"]:
                  cpu_entries.append(
                      {
                          "torch_version": "2.11.0",
                          "torchvision_version": "0.26.0",
                          "torchaudio_version": "2.11.0",
                          "python_version": py_version,
                          **target,
                      }
                  )

          cpu_matrix = {"include": cpu_entries}
          missing = select_missing_matrix_entries(cpu_matrix, release_assets)
          missing_keys = {
              (entry["target_os"], entry["target_arch"], entry.get("backend", "cpu"))
              for entry in missing["include"]
          }
          assert missing_keys == {
              ("windows", "x86_64", "cpu"),
              ("macos", "arm64", "mps"),
          }, f"unexpected missing matrix entries: {missing_keys}"

          windows_entry = next(
              entry
              for entry in cpu_entries
              if entry["target_os"] == "windows"
          )
          assert not matrix_entry_is_complete(windows_entry, release_assets)

          linux_entry = next(
              entry for entry in cpu_entries if entry["target_os"] == "linux"
          )
          assert matrix_entry_is_complete(linux_entry, release_assets)

  companion-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate derived companion version mapping
        shell: python
        run: |
          import sys

          sys.path.insert(0, "scripts")
          from companion_source import (
              derive_torchaudio_version,
              derive_torchvision_version,
          )

          assert derive_torchvision_version("2.11.0") == "0.26.0"
          assert derive_torchaudio_version("2.11.0") == "2.11.0"
          assert derive_torchvision_version("2.12.0") == "0.27.0"
          assert derive_torchaudio_version("2.12.0") == "2.12.0"

      - name: Verify torch 2.11.0 companion source tags exist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/check_build_readiness.py --torch-version 2.11.0

  plan-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve latest PyTorch version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/resolve_latest_torch.py --output resolved.json

      - name: Run plan against current state
        run: |
          python scripts/plan_release.py \
            --resolved-file resolved.json \
            --state-file release-state/latest.json > plan.json
          cat plan.json

      - name: Validate plan output shape
        shell: python
        run: |
          import json
          from pathlib import Path

          plan = json.loads(Path("plan.json").read_text(encoding="utf-8"))
          assert "should_build" in plan, "missing should_build"
          assert "torch_version" in plan, "missing torch_version"
          assert "release_tag" in plan, "missing release_tag"
          assert "release_reason" in plan, "missing release_reason"
          assert isinstance(plan["should_build"], bool), "should_build must be bool"
          print(
              f"Plan: should_build={plan['should_build']}, "
              f"version={plan['torch_version']}, "
              f"reason={plan['release_reason']}"
          )
