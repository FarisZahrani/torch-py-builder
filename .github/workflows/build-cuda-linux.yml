name: Build PyTorch CUDA Linux Wheels

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: Force CUDA rebuild even if release assets already exist.
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      target_arch_filter:
        description: Optional target architecture filter.
        required: false
        default: "any"
        type: choice
        options:
          - any
          - x86_64
      python_version_filter:
        description: Optional Python version filter (e.g. 3.13).
        required: false
        default: ""
        type: string
      release_tag:
        description: Optional shared release tag override. Defaults to release-state/latest.json.
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build-cuda-linux:
    uses: ./.github/workflows/build-cuda-shared.yml
    with:
      force_rebuild: ${{ inputs.force_rebuild }}
      target_os_filter: linux
      target_arch_filter: ${{ inputs.target_arch_filter }}
      python_version_filter: ${{ inputs.python_version_filter }}
      release_tag: ${{ inputs.release_tag }}
    secrets: inherit
