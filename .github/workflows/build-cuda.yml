  release:
    if: needs.check-upstream.outputs.should_build == 'true' && needs.check-upstream.outputs.cuda_matrix_has_entries == 'true'
    needs: [check-upstream, validate-artifacts, validate-torchvision-artifacts, validate-torchaudio-artifacts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download CUDA artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: '*-cuda'
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Restore release plan
        run: |
          printf '%s' '${{ needs.check-upstream.outputs.release_plan_json }}' > release-plan.json
          cat release-plan.json

      - name: Update release state files
        env:
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python scripts/update_release_state.py \
            --plan-file release-plan.json \
            --output-dir release-state \
            --build-source-commit "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --workflow-run-url "${GITHUB_RUN_URL}" \
            --repository "${{ github.repository }}" \
            --event-name "${{ github.event_name }}"

      - id: commit-state
        name: Commit release state
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-state

          if git diff --cached --quiet; then
            echo "release_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Record CUDA release state for ${{ needs.check-upstream.outputs.release_tag }}"
          git push origin HEAD:${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
          echo "release_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - id: push-tag
        name: Create and push release tag
        env:
          RELEASE_TAG: ${{ needs.check-upstream.outputs.release_tag }}
          RELEASE_COMMIT_SHA: ${{ steps.commit-state.outputs.release_commit_sha }}
        run: |
          set -euo pipefail

          git fetch --tags --force --prune --prune-tags
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag already exists on origin: ${RELEASE_TAG}"
            echo "tag_name=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            git tag -d "${RELEASE_TAG}"
          fi

          git tag -a "${RELEASE_TAG}" "${RELEASE_COMMIT_SHA}" -m "Release ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"
          echo "tag_name=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.push-tag.outputs.tag_name }}
          name: "PyTorch ${{ needs.check-upstream.outputs.torch_version }} — Source-Built torch, torchvision, and torchaudio Wheels"
          fail_on_unmatched_files: true
          generate_release_notes: false
          body: |
            Source-built **torch ${{ needs.check-upstream.outputs.torch_version }}**, matching torchvision, and matching torchaudio wheels for platforms and Python versions not covered by official PyPI releases.

            ### Package Layout
            - The release tag is shared across the full package family and remains torch-based.
            - `torch`, `torchvision`, and `torchaudio` are published as separate wheel files.
            - CPU and MPS assets are published by the CPU workflow first.
            - Missing CUDA assets are appended by this follow-up CUDA workflow.

            ### Platforms & Backends
            | Platform | Backend |
            |---|---|
            | Linux x86\_64 | CUDA 12.4 |
            | Windows x86\_64 | CUDA 12.4 |

            ### Python Versions
            See attached wheel filenames for the full CUDA matrix.

            ### Notes
            - These wheels preserve the normal package split: install `torch`, `torchvision`, and `torchaudio` separately as needed.
            - CUDA wheels include compiled CUDA kernels. A physical NVIDIA GPU is required at runtime for GPU acceleration.
            - Torch is built from the official PyTorch source at tag `v${{ needs.check-upstream.outputs.torch_version }}`.
          files: release-assets/*