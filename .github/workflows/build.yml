name: Build PyTorch CPU and MPS Family Wheels

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force build even if latest release already has the same version."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      torch_version_override:
        description: "Optional PyTorch version to build (e.g. 2.7.0). Overrides upstream resolution."
        required: false
        default: ""
        type: string
      target_os_filter:
        description: "Optional target OS filter."
        required: false
        default: "any"
        type: choice
        options:
          - any
          - linux
          - windows
          - macos
      target_arch_filter:
        description: "Optional target architecture filter."
        required: false
        default: "any"
        type: choice
        options:
          - any
          - x86_64
          - arm64
      backend_filter:
        description: "Optional backend filter."
        required: false
        default: "any"
        type: choice
        options:
          - any
          - cpu
          - cuda
          - mps
      python_version_filter:
        description: "Optional Python version filter (e.g. 3.13)."
        required: false
        default: ""
        type: string
      release_tag:
        description: "Optional shared release tag override (e.g. torch-2.7.0) for torch, torchvision, and torchaudio assets. If set, creates a GitHub release."
        required: false
        type: string

permissions:
  contents: read

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.plan-phase.outputs.should_build }}
      torch_version: ${{ steps.plan.outputs.torch_version }}
      torchvision_version: ${{ steps.resolve-companions.outputs.torchvision_version }}
      torchaudio_version: ${{ steps.resolve-companions.outputs.torchaudio_version }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      release_plan_json: ${{ steps.plan.outputs.release_plan_json }}
      matrix: ${{ steps.make-matrix.outputs.matrix }}
      matrix_has_entries: ${{ steps.make-matrix.outputs.matrix_has_entries }}
      cpu_matrix: ${{ steps.plan-phase.outputs.cpu_matrix }}
      cpu_matrix_has_entries: ${{ steps.plan-phase.outputs.cpu_matrix_has_entries }}
      cuda_candidate_matrix: ${{ steps.make-matrix.outputs.cuda_candidate_matrix }}
      cuda_candidate_has_entries: ${{ steps.make-matrix.outputs.cuda_candidate_has_entries }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TORCH_VERSION_OVERRIDE: ${{ github.event.inputs.torch_version_override || '' }}
        run: |
          set -euo pipefail
          EXTRA_ARGS=()
          if [ -n "${TORCH_VERSION_OVERRIDE}" ]; then
            EXTRA_ARGS+=(--version-override "${TORCH_VERSION_OVERRIDE}")
          fi
          python scripts/resolve_latest_torch.py \
            --output resolved.json \
            "${EXTRA_ARGS[@]}"
          cat resolved.json

      - id: plan
        env:
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag || '' }}
        run: |
          set -euo pipefail

          PLAN_ARGS=()
          if [ "${FORCE_REBUILD}" = "true" ]; then
            PLAN_ARGS+=(--force)
          fi
          if [ -n "${RELEASE_TAG_INPUT}" ]; then
            PLAN_ARGS+=(--release-tag "${RELEASE_TAG_INPUT}")
          fi

          python scripts/plan_release.py \
            --resolved-file resolved.json \
            --state-file release-state/latest.json \
            "${PLAN_ARGS[@]}" > release-plan.json

          cat release-plan.json
          echo "should_build=$(jq -r '.should_build' release-plan.json)" >> "$GITHUB_OUTPUT"
          echo "torch_version=$(jq -r '.torch_version' release-plan.json)" >> "$GITHUB_OUTPUT"
          echo "release_tag=$(jq -r '.release_tag' release-plan.json)" >> "$GITHUB_OUTPUT"
          echo "release_plan_json=$(jq -c . release-plan.json)" >> "$GITHUB_OUTPUT"

      - id: resolve-companions
        run: |
          set -euo pipefail

          python scripts/resolve_companion_versions.py \
            --torch-version "${{ steps.plan.outputs.torch_version }}" \
            --output companion-versions.json

          cat companion-versions.json
          echo "torchvision_version=$(jq -r '.torchvision_version' companion-versions.json)" >> "$GITHUB_OUTPUT"
          echo "torchaudio_version=$(jq -r '.torchaudio_version' companion-versions.json)" >> "$GITHUB_OUTPUT"

      - id: make-matrix
        env:
          TARGET_OS_FILTER: ${{ github.event.inputs.target_os_filter || 'any' }}
          TARGET_ARCH_FILTER: ${{ github.event.inputs.target_arch_filter || 'any' }}
          BACKEND_FILTER: ${{ github.event.inputs.backend_filter || 'any' }}
          PYTHON_VERSION_FILTER: ${{ github.event.inputs.python_version_filter || '' }}
        shell: python
        run: |
          import json
          import os
          from pathlib import Path

          matrix_config = json.loads(Path("config/build_matrix.json").read_text(encoding="utf-8"))
          plan = json.loads(Path("release-plan.json").read_text(encoding="utf-8"))
          companion_versions = json.loads(Path("companion-versions.json").read_text(encoding="utf-8"))

          torch_version = plan["torch_version"]
          torchvision_version = companion_versions["torchvision_version"]
          torchaudio_version = companion_versions["torchaudio_version"]
          python_versions = matrix_config["python_versions"]
          targets = matrix_config["targets"]

          target_os_filter = os.environ.get("TARGET_OS_FILTER", "any").strip().lower() or "any"
          target_arch_filter = os.environ.get("TARGET_ARCH_FILTER", "any").strip().lower() or "any"
          backend_filter = os.environ.get("BACKEND_FILTER", "any").strip().lower() or "any"
          python_version_filter = os.environ.get("PYTHON_VERSION_FILTER", "").strip()

          valid_os = {"any", "linux", "windows", "macos"}
          valid_arch = {"any", "x86_64", "arm64"}
          valid_backends = {"any", "cpu", "cuda", "mps"}
          if target_os_filter not in valid_os:
              raise SystemExit(f"Invalid target_os_filter: {target_os_filter}")
          if target_arch_filter not in valid_arch:
              raise SystemExit(f"Invalid target_arch_filter: {target_arch_filter}")
          if backend_filter not in valid_backends:
              raise SystemExit(f"Invalid backend_filter: {backend_filter}")

          include = []
          for target in targets:
              if target_os_filter != "any" and target["target_os"] != target_os_filter:
                  continue
              if target_arch_filter != "any" and target["target_arch"] != target_arch_filter:
                  continue
              if backend_filter != "any" and target.get("backend", "cpu") != backend_filter:
                  continue
              for py_version in python_versions:
                  if python_version_filter and py_version != python_version_filter:
                      continue
                  py_nodot = py_version.replace(".", "")
                  backend = target.get("backend", "cpu")
                  artifact_name = (
                      f"torch-{torch_version}-py{py_nodot}"
                      f"-{target['target_os']}-{target['target_arch']}-{backend}"
                  )
                  torchvision_artifact_name = (
                      f"torchvision-{torchvision_version}-py{py_nodot}"
                      f"-{target['target_os']}-{target['target_arch']}-{backend}"
                  )
                  torchaudio_artifact_name = (
                      f"torchaudio-{torchaudio_version}-py{py_nodot}"
                      f"-{target['target_os']}-{target['target_arch']}-{backend}"
                  )
                  include.append(
                      {
                          "torch_version": torch_version,
                          "torchvision_version": torchvision_version,
                          "torchaudio_version": torchaudio_version,
                          "python_version": py_version,
                          "artifact_name": artifact_name,
                          "torchvision_artifact_name": torchvision_artifact_name,
                          "torchaudio_artifact_name": torchaudio_artifact_name,
                          **target,
                      }
                  )

          if targets and not include:
              raise SystemExit(
                  "Selected filters produced an empty build matrix. "
                  "Check target_os_filter/target_arch_filter/backend_filter/python_version_filter values."
              )

          matrix = {"include": include}
          cpu_candidate_matrix = {
              "include": [entry for entry in include if entry.get("backend") != "cuda"]
          }
          cuda_candidate_matrix = {
              "include": [entry for entry in include if entry.get("backend") == "cuda"]
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps(matrix)}\n")
              fh.write(f"matrix_has_entries={'true' if include else 'false'}\n")
              fh.write(f"cpu_candidate_matrix={json.dumps(cpu_candidate_matrix)}\n")
              fh.write(
                  f"cpu_candidate_has_entries={'true' if cpu_candidate_matrix['include'] else 'false'}\n"
              )
              fh.write(f"cuda_candidate_matrix={json.dumps(cuda_candidate_matrix)}\n")
              fh.write(
                  f"cuda_candidate_has_entries={'true' if cuda_candidate_matrix['include'] else 'false'}\n"
              )

      - id: inspect-release-assets
        if: steps.plan.outputs.release_tag != ''
        uses: actions/github-script@v8
        with:
          script: |
            const tag = '${{ steps.plan.outputs.release_tag }}'
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              })
              const assetNames = release.data.assets.map((asset) => asset.name)
              core.setOutput('exists', 'true')
              core.setOutput('asset_names_json', JSON.stringify(assetNames))
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('exists', 'false')
                core.setOutput('asset_names_json', '[]')
                return
              }
              throw error
            }

      - id: plan-phase
        shell: python
        env:
          CPU_CANDIDATE_MATRIX: ${{ steps.make-matrix.outputs.cpu_candidate_matrix }}
          CUDA_CANDIDATE_MATRIX: ${{ steps.make-matrix.outputs.cuda_candidate_matrix }}
          RELEASE_ASSET_NAMES_JSON: ${{ steps.inspect-release-assets.outputs.asset_names_json }}
        run: |
          import json
          import os
          from pathlib import Path

          plan = json.loads(Path("release-plan.json").read_text(encoding="utf-8"))
          cpu_candidate_matrix = json.loads(
              os.environ.get("CPU_CANDIDATE_MATRIX") or '{"include": []}'
          )
          cuda_candidate_matrix = json.loads(
              os.environ.get("CUDA_CANDIDATE_MATRIX") or '{"include": []}'
          )
          release_asset_names = set(
              json.loads(os.environ.get("RELEASE_ASSET_NAMES_JSON") or "[]")
          )

          def select_missing_entries(matrix: dict) -> dict:
              filtered = []
              for entry in matrix.get("include", []):
                  expected_assets = {
                      entry["artifact_name"],
                      entry["torchvision_artifact_name"],
                      entry["torchaudio_artifact_name"],
                  }
                  if not expected_assets.issubset(release_asset_names):
                      filtered.append(entry)
              return {"include": filtered}

          if plan.get("release_reason") == "forced":
              cpu_matrix = cpu_candidate_matrix
              cuda_missing_now = cuda_candidate_matrix
          else:
              cpu_matrix = select_missing_entries(cpu_candidate_matrix)
              cuda_missing_now = select_missing_entries(cuda_candidate_matrix)

          should_build = bool(cpu_matrix["include"])

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"should_build={'true' if should_build else 'false'}\n")
              fh.write(f"cpu_matrix={json.dumps(cpu_matrix)}\n")
              fh.write(
                  f"cpu_matrix_has_entries={'true' if cpu_matrix['include'] else 'false'}\n"
              )

  validate-scripts:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify Python scripts compile
        run: python -m compileall scripts

      - name: Smoke test script CLIs
        run: |
          python scripts/resolve_latest_torch.py --help
          python scripts/resolve_companion_versions.py --help
          python scripts/plan_release.py --help
          python scripts/update_release_state.py --help
          python scripts/validate_wheel.py --help

  build:
    needs: [check-upstream, validate-scripts]
    if: needs.check-upstream.outputs.should_build == 'true' && needs.check-upstream.outputs.cpu_matrix_has_entries == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check-upstream.outputs.cpu_matrix) }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
      USE_RELATIVE_PATHS: "1"
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
      CMAKE_CUDA_COMPILER_LAUNCHER: sccache
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - name: Free disk space (Linux)
        if: matrix.target_os == 'linux'
        run: |
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo apt-get autoremove -y
          sudo apt-get clean
          df -h

      - name: Install build dependencies (Linux)
        if: matrix.target_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential \
            libopenblas-dev libomp-dev

      - name: Install build dependencies (macOS)
        if: matrix.target_os == 'macos'
        run: |
          brew update
          brew install cmake ninja libomp

      - name: Install build dependencies (Windows)
        if: matrix.target_os == 'windows'
        shell: pwsh
        run: |
          choco install cmake ninja -y
          echo "C:\Program Files\CMake\bin" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Set up compiler cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Show compiler cache configuration
        shell: bash
        run: |
          echo "sccache path: $SCCACHE_PATH"
          "$SCCACHE_PATH" --show-stats || true

      - name: Set up MSVC (Windows)
        if: matrix.target_os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CUDA Toolkit
        if: matrix.backend == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.29
        with:
          cuda: '12.4.1'
          method: 'network'

      - name: Discover CUDA home (Linux CUDA)
        if: matrix.backend == 'cuda' && matrix.target_os == 'linux'
        id: cuda_home
        shell: bash
        run: |
          set -euo pipefail
          cuda_root=""
          for candidate in "${CUDA_PATH:-}" "${CUDA_HOME:-}"; do
            if [ -n "$candidate" ] && [ -d "$candidate" ]; then
              cuda_root="$candidate"
              break
            fi
          done
          if [ -z "$cuda_root" ] && command -v nvcc >/dev/null 2>&1; then
            cuda_root="$(cd "$(dirname "$(command -v nvcc)")/.."; pwd)"
          fi
          if [ -z "$cuda_root" ]; then
            for candidate in /usr/local/cuda /usr/local/cuda-* /opt/cuda; do
              if [ -d "$candidate" ]; then cuda_root="$candidate"; break; fi
            done
          fi
          if [ -z "$cuda_root" ]; then
            echo "Could not determine CUDA root" >&2; exit 1
          fi
          echo "cuda_root=$cuda_root" >> "$GITHUB_OUTPUT"
          echo "Using CUDA root: $cuda_root"

      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: git config --global core.longpaths true

      - name: Clone PyTorch source
        shell: bash
        run: |
          git clone \
            --branch "v${{ matrix.torch_version }}" \
            --depth 1 \
            https://github.com/pytorch/pytorch \
            pytorch-src

      - name: Initialize submodules
        shell: bash
        working-directory: pytorch-src
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --depth 1 --jobs 4

      - name: Fix script permissions (macOS)
        if: runner.os == 'macOS'
        shell: bash
        working-directory: pytorch-src
        run: find scripts -name "*.sh" -exec chmod +x {} \;

      - name: Install PyTorch build requirements
        shell: bash
        working-directory: pytorch-src
        run: |
          python -m pip install --upgrade pip
          pip install "cmake<4" ninja build wheel
          pip install -r requirements.txt

      - name: Prepend pip cmake to PATH
        shell: bash
        run: |
          CMAKE_BIN=$(python -c "import cmake, os; print(os.path.join(os.path.dirname(cmake.__file__), 'data', 'bin'))")
          echo "$CMAKE_BIN" >> "$GITHUB_PATH"

      - name: Reduce allocator fragmentation (Linux CUDA)
        if: matrix.target_os == 'linux' && matrix.backend == 'cuda'
        shell: bash
        run: |
          set -euo pipefail
          jemalloc_lib="$(find /usr/lib* -name 'libjemalloc.so.2' 2>/dev/null | head -1 || true)"
          if [ -n "$jemalloc_lib" ]; then
            echo "LD_PRELOAD=$jemalloc_lib" >> "$GITHUB_ENV"
            echo "Using jemalloc: $jemalloc_lib"
          else
            echo "jemalloc not found; continuing without it"
          fi

      - name: Build libtorch (Linux CPU)
        if: matrix.target_os == 'linux' && matrix.backend == 'cpu'
        working-directory: pytorch-src
        env:
          USE_CUDA: "0"
          USE_ROCM: "0"
          USE_MKLDNN: "1"
          USE_NUMPY: "1"
          BUILD_TEST: "0"
          MAX_JOBS: "3"
        run: |
          PYTHON_BIN=$(python -c "import sys; print(sys.executable)")
          PYTHON_TAG=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          export PYTHON_EXECUTABLE="$PYTHON_BIN"
          export Python_EXECUTABLE="$PYTHON_BIN"
          export Python3_EXECUTABLE="$PYTHON_BIN"
          export DESIRED_PYTHON="$PYTHON_TAG"
          python tools/build_libtorch.py

      - name: Build wheel from libtorch (Linux CPU)
        if: matrix.target_os == 'linux' && matrix.backend == 'cpu'
        working-directory: pytorch-src
        env:
          USE_CUDA: "0"
          USE_ROCM: "0"
          USE_MKLDNN: "1"
          USE_NUMPY: "1"
          BUILD_TEST: "0"
          MAX_JOBS: "3"
          CMAKE_FRESH: "1"
        run: |
          PYTHON_BIN=$(python -c "import sys; print(sys.executable)")
          PYTHON_TAG=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          export PYTHON_EXECUTABLE="$PYTHON_BIN"
          export Python_EXECUTABLE="$PYTHON_BIN"
          export Python3_EXECUTABLE="$PYTHON_BIN"
          export DESIRED_PYTHON="$PYTHON_TAG"
          python -m build --wheel --no-isolation

      - name: Build libtorch (Linux CUDA)
        if: matrix.target_os == 'linux' && matrix.backend == 'cuda'
        working-directory: pytorch-src
        env:
          USE_CUDA: "1"
          USE_ROCM: "0"
          USE_MKLDNN: "1"
          USE_NUMPY: "1"
          USE_DISTRIBUTED: "0"
          BUILD_TEST: "0"
          MAX_JOBS: "3"
          CUDA_HOME: ${{ steps.cuda_home.outputs.cuda_root }}
          TORCH_CUDA_ARCH_LIST: "5.0;6.0;7.0;7.5;8.0;8.6;8.9;9.0+PTX"
        run: |
          PYTHON_BIN=$(python -c "import sys; print(sys.executable)")
          PYTHON_TAG=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          export PYTHON_EXECUTABLE="$PYTHON_BIN"
          export Python_EXECUTABLE="$PYTHON_BIN"
          export Python3_EXECUTABLE="$PYTHON_BIN"
          export DESIRED_PYTHON="$PYTHON_TAG"
          python tools/build_libtorch.py

      - name: Build wheel from libtorch (Linux CUDA)
        if: matrix.target_os == 'linux' && matrix.backend == 'cuda'
        working-directory: pytorch-src
        env:
          USE_CUDA: "1"
          USE_ROCM: "0"
          USE_MKLDNN: "1"
          USE_NUMPY: "1"
          USE_DISTRIBUTED: "0"
          BUILD_TEST: "0"
          MAX_JOBS: "3"
          CUDA_HOME: ${{ steps.cuda_home.outputs.cuda_root }}
          TORCH_CUDA_ARCH_LIST: "5.0;6.0;7.0;7.5;8.0;8.6;8.9;9.0+PTX"
          CMAKE_FRESH: "1"
        run: |
          PYTHON_BIN=$(python -c "import sys; print(sys.executable)")
          PYTHON_TAG=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          export PYTHON_EXECUTABLE="$PYTHON_BIN"
          export Python_EXECUTABLE="$PYTHON_BIN"
          export Python3_EXECUTABLE="$PYTHON_BIN"
          export DESIRED_PYTHON="$PYTHON_TAG"
          python -m build --wheel --no-isolation

      - name: Build libtorch (macOS arm64 MPS)
        if: matrix.target_os == 'macos' && matrix.target_arch == 'arm64'
        working-directory: pytorch-src
        env:
          USE_CUDA: "0"
          USE_ROCM: "0"
          USE_MKLDNN: "0"
          USE_MPS: "1"
          USE_NUMPY: "1"
          BUILD_TEST: "0"
          MAX_JOBS: "3"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CMAKE_OSX_ARCHITECTURES: "arm64"
        run: |
          PYTHON_BIN=$(python -c "import sys; print(sys.executable)")
          PYTHON_TAG=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          export PYTHON_EXECUTABLE="$PYTHON_BIN"
          export Python_EXECUTABLE="$PYTHON_BIN"
          export Python3_EXECUTABLE="$PYTHON_BIN"
          export DESIRED_PYTHON="$PYTHON_TAG"
          python tools/build_libtorch.py

      - name: Build wheel from libtorch (macOS arm64 MPS)
        if: matrix.target_os == 'macos' && matrix.target_arch == 'arm64'
        working-directory: pytorch-src
        env:
          USE_CUDA: "0"
          USE_ROCM: "0"
          USE_MKLDNN: "0"
          USE_MPS: "1"
          USE_NUMPY: "1"
          BUILD_TEST: "0"
          MAX_JOBS: "3"
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          CMAKE_OSX_ARCHITECTURES: "arm64"
          CMAKE_FRESH: "1"
        run: |
          PYTHON_BIN=$(python -c "import sys; print(sys.executable)")
          PYTHON_TAG=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          export PYTHON_EXECUTABLE="$PYTHON_BIN"
          export Python_EXECUTABLE="$PYTHON_BIN"
          export Python3_EXECUTABLE="$PYTHON_BIN"
          export DESIRED_PYTHON="$PYTHON_TAG"
          python -m build --wheel --no-isolation

      - name: Build libtorch (macOS x86_64 CPU)
        if: matrix.target_os == 'macos' && matrix.target_arch == 'x86_64'
        working-directory: pytorch-src
        env:
          USE_CUDA: "0"
          USE_ROCM: "0"
          USE_MKLDNN: "0"
          USE_NUMPY: "1"
          BUILD_TEST: "0"
          MAX_JOBS: "3"
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          CMAKE_OSX_ARCHITECTURES: "x86_64"
        run: |
          PYTHON_BIN=$(python -c "import sys; print(sys.executable)")
          PYTHON_TAG=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          export PYTHON_EXECUTABLE="$PYTHON_BIN"
          export Python_EXECUTABLE="$PYTHON_BIN"
          export Python3_EXECUTABLE="$PYTHON_BIN"
          export DESIRED_PYTHON="$PYTHON_TAG"
          python tools/build_libtorch.py

      - name: Build wheel from libtorch (macOS x86_64 CPU)
        if: matrix.target_os == 'macos' && matrix.target_arch == 'x86_64'
        working-directory: pytorch-src
        env:
          USE_CUDA: "0"
          USE_ROCM: "0"
          USE_MKLDNN: "0"
          USE_NUMPY: "1"
          BUILD_TEST: "0"
          MAX_JOBS: "3"
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          CMAKE_OSX_ARCHITECTURES: "x86_64"
          CMAKE_FRESH: "1"
        run: |
          PYTHON_BIN=$(python -c "import sys; print(sys.executable)")
          PYTHON_TAG=$(python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')")
          export PYTHON_EXECUTABLE="$PYTHON_BIN"
          export Python_EXECUTABLE="$PYTHON_BIN"
          export Python3_EXECUTABLE="$PYTHON_BIN"
          export DESIRED_PYTHON="$PYTHON_TAG"
          python -m build --wheel --no-isolation

      - name: Build libtorch (Windows CPU)
        if: matrix.target_os == 'windows' && matrix.backend == 'cpu'
        working-directory: pytorch-src
        shell: pwsh
        env:
          USE_CUDA: "0"
          USE_ROCM: "0"
          USE_NUMPY: "1"
          BUILD_TEST: "0"
          MAX_JOBS: "3"
          CMAKE_GENERATOR: "Ninja"
        run: |
          $pythonExe = python -c "import sys; print(sys.executable)"
          $pythonTag = python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')"
          $env:PYTHON_EXECUTABLE = $pythonExe
          $env:Python_EXECUTABLE = $pythonExe
          $env:Python3_EXECUTABLE = $pythonExe
          $env:DESIRED_PYTHON = $pythonTag
          python tools/build_libtorch.py

      - name: Build wheel from libtorch (Windows CPU)
        if: matrix.target_os == 'windows' && matrix.backend == 'cpu'
        working-directory: pytorch-src
        shell: pwsh
        env:
          USE_CUDA: "0"
          USE_ROCM: "0"
          USE_NUMPY: "1"
          BUILD_TEST: "0"
          MAX_JOBS: "3"
          CMAKE_GENERATOR: "Ninja"
          CMAKE_FRESH: "1"
        run: |
          $pythonExe = python -c "import sys; print(sys.executable)"
          $pythonTag = python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')"
          $env:PYTHON_EXECUTABLE = $pythonExe
          $env:Python_EXECUTABLE = $pythonExe
          $env:Python3_EXECUTABLE = $pythonExe
          $env:DESIRED_PYTHON = $pythonTag
          python -m build --wheel --no-isolation

      - name: Trim PATH for Windows CUDA build
        if: matrix.target_os == 'windows' && matrix.backend == 'cuda'
        shell: pwsh
        run: |
          # ilammy/msvc-dev-cmd already ran vcvars64.bat, adding MSVC paths to PATH.
          # cmake's CUDA compiler ID test generates a script that calls vcvars64.bat again.
          # If MSVC paths are still in PATH, the doubled entries push PATH over cmd.exe's
          # 8191-char limit. Strip MSVC paths now so vcvars64.bat can re-add them cleanly.
          $trimmed = ($env:PATH -split ';' | Select-Object -Unique | Where-Object {
            $_ -ne '' -and
            $_ -notmatch '\\Microsoft Visual Studio\\' -and
            $_ -notmatch '\\MSBuild\\' -and
            $_ -notmatch '\\Common7\\'
          }) -join ';'
          "PATH=$trimmed" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build libtorch (Windows CUDA)
        if: matrix.target_os == 'windows' && matrix.backend == 'cuda'
        working-directory: pytorch-src
        shell: pwsh
        env:
          USE_CUDA: "1"
          USE_ROCM: "0"
          USE_NUMPY: "1"
          BUILD_TEST: "0"
          MAX_JOBS: "3"
          CMAKE_GENERATOR: "Ninja"
          TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.6;8.9;9.0"
        run: |
          $pythonExe = python -c "import sys; print(sys.executable)"
          $pythonTag = python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')"
          $env:PYTHON_EXECUTABLE = $pythonExe
          $env:Python_EXECUTABLE = $pythonExe
          $env:Python3_EXECUTABLE = $pythonExe
          $env:DESIRED_PYTHON = $pythonTag
          python tools/build_libtorch.py

      - name: Build wheel from libtorch (Windows CUDA)
        if: matrix.target_os == 'windows' && matrix.backend == 'cuda'
        working-directory: pytorch-src
        shell: pwsh
        env:
          USE_CUDA: "1"
          USE_ROCM: "0"
          USE_NUMPY: "1"
          BUILD_TEST: "0"
          MAX_JOBS: "3"
          CMAKE_GENERATOR: "Ninja"
          TORCH_CUDA_ARCH_LIST: "7.5;8.0;8.6;8.9;9.0"
          CMAKE_FRESH: "1"
        run: |
          $pythonExe = python -c "import sys; print(sys.executable)"
          $pythonTag = python -c "import sys; print(f'cp{sys.version_info.major}{sys.version_info.minor}')"
          $env:PYTHON_EXECUTABLE = $pythonExe
          $env:Python_EXECUTABLE = $pythonExe
          $env:Python3_EXECUTABLE = $pythonExe
          $env:DESIRED_PYTHON = $pythonTag
          python -m build --wheel --no-isolation

      - name: Collect built wheel
        shell: bash
        run: |
          python - <<'PY'
          import pathlib
          import shutil
          import sys

          source_dir = pathlib.Path("pytorch-src/dist")
          target_dir = pathlib.Path("dist")
          expected_tag = f"cp{sys.version_info.major}{sys.version_info.minor}"

          all_wheels = sorted(source_dir.glob("*.whl"))
          if not all_wheels:
            raise SystemExit("No wheel found in pytorch-src/dist/")

          matches = [wheel for wheel in all_wheels if expected_tag in wheel.name]
          if not matches:
            found = ", ".join(wheel.name for wheel in all_wheels)
            raise SystemExit(
              f"No wheel matching {expected_tag} found in pytorch-src/dist/: {found}"
            )

          if target_dir.exists():
            shutil.rmtree(target_dir)
          target_dir.mkdir()

          for wheel in matches:
            shutil.copy2(wheel, target_dir / wheel.name)

          print(f"Selected wheels for upload ({expected_tag}):")
          for wheel in matches:
            print(f" - {wheel.name}")
          PY
          echo "Built wheels:"
          ls -lh dist/

      - name: Verify built wheel tag
        shell: bash
        run: |
          python - <<'PY'
          import pathlib
          import sys

          wheels = sorted(pathlib.Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel found in dist/")

          expected_tag = f"cp{sys.version_info.major}{sys.version_info.minor}"
          for wheel in wheels:
            if expected_tag not in wheel.name:
              raise SystemExit(
                f"Wheel tag mismatch: expected {expected_tag} in {wheel.name}"
              )

          print("Verified wheel tags:")
          for wheel in wheels:
            print(f" - {wheel.name}")
          PY

      - name: Validate built wheel (Linux / macOS)
        if: matrix.target_os != 'windows'
        env:
          BUILD_BACKEND: ${{ matrix.backend }}
        shell: bash
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          pip install --force-reinstall "$WHEEL"
          python -c "
          import os, torch
          print(f'torch version: {torch.__version__}')
          t = torch.ones(2, 2)
          assert t.sum().item() == 4.0, 'tensor sum check failed'
          linear = torch.nn.Linear(2, 2)
          out = linear(t)
          print(f'nn.Linear output shape: {out.shape}')
          backend = os.environ.get('BUILD_BACKEND', 'cpu')
          if backend == 'cuda':
              assert torch.version.cuda is not None, 'Expected CUDA build but torch.version.cuda is None'
              print(f'CUDA compiled version: {torch.version.cuda}')
          elif backend == 'mps':
              print(f'MPS built-in: {hasattr(torch.backends, \"mps\")}')
          print('smoke-ok')
          "

      - name: Validate built wheel (Windows)
        if: matrix.target_os == 'windows'
        env:
          BUILD_BACKEND: ${{ matrix.backend }}
        shell: pwsh
        run: |
          $wheel = Get-ChildItem -Path dist -Filter *.whl | Select-Object -First 1
          if (-not $wheel) { throw "No wheel found in dist/" }
          pip install --force-reinstall $wheel.FullName
          python -c "
          import os, traceback
          try:
              import torch
              print(f'torch version: {torch.__version__}')
              t = torch.ones(2, 2)
              assert t.sum().item() == 4.0
              backend = os.environ.get('BUILD_BACKEND', 'cpu')
              if backend == 'cuda':
                  assert torch.version.cuda is not None, 'Expected CUDA build but torch.version.cuda is None'
                  print(f'CUDA compiled version: {torch.version.cuda}')
              print('smoke-ok')
          except Exception:
              traceback.print_exc()
              raise
          "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.whl
          if-no-files-found: error

      - name: Show compiler cache stats
        if: always()
        shell: bash
        run: |
          "$SCCACHE_PATH" --show-stats || true

  validate-artifacts:
    needs: [check-upstream, build]
    if: always() && needs.check-upstream.outputs.should_build == 'true' && needs.check-upstream.outputs.cpu_matrix_has_entries == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check-upstream.outputs.cpu_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - id: artifact-check
        name: Check wheel artifact presence
        uses: actions/github-script@v8
        with:
          script: |
            const artifactName = '${{ matrix.artifact_name }}';
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              }
            );
            const artifact = artifacts.find((item) => item.name === artifactName);
            core.setOutput('exists', artifact ? 'true' : 'false');
            if (artifact) {
              core.info(`Found artifact ${artifactName}`);
            } else {
              core.warning(`Artifact ${artifactName} is missing`);
            }

      - name: Download built wheel
        if: steps.artifact-check.outputs.exists == 'true'
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-artifact

      - name: Validate wheel structure
        if: steps.artifact-check.outputs.exists == 'true'
        shell: bash
        run: |
          WHEEL=$(ls dist-artifact/*.whl | head -1)
          python scripts/validate_wheel.py "$WHEEL" \
            --expected-version "${{ matrix.torch_version }}"

      - name: Fail when expected artifact is missing
        if: steps.artifact-check.outputs.exists != 'true'
        shell: bash
        run: |
          echo "Missing build artifact for ${{ matrix.artifact_name }}."
          echo "A corresponding build matrix job failed or timed out before upload."
          exit 1

  build-torchvision:
    needs: [check-upstream, build]
    if: always() && needs.check-upstream.outputs.should_build == 'true' && needs.check-upstream.outputs.cpu_matrix_has_entries == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check-upstream.outputs.cpu_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install build dependencies (Linux)
        if: matrix.target_os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential \
            libjpeg-dev libpng-dev libwebp-dev

      - name: Install build dependencies (macOS)
        if: matrix.target_os == 'macos'
        run: |
          brew update
          brew install cmake ninja libpng jpeg-turbo webp

      - name: Install build dependencies (Windows)
        if: matrix.target_os == 'windows'
        shell: pwsh
        run: |
          choco install cmake ninja -y
          echo "C:\Program Files\CMake\bin" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Set up MSVC (Windows)
        if: matrix.target_os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CUDA Toolkit
        if: matrix.backend == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.29
        with:
          cuda: '12.4.1'
          method: 'network'

      - name: Discover CUDA home (Linux CUDA)
        if: matrix.backend == 'cuda' && matrix.target_os == 'linux'
        id: torchvision_cuda_home
        shell: bash
        run: |
          set -euo pipefail
          cuda_root=""
          for candidate in "${CUDA_PATH:-}" "${CUDA_HOME:-}"; do
            if [ -n "$candidate" ] && [ -d "$candidate" ]; then
              cuda_root="$candidate"
              break
            fi
          done
          if [ -z "$cuda_root" ] && command -v nvcc >/dev/null 2>&1; then
            cuda_root="$(cd "$(dirname "$(command -v nvcc)")/.."; pwd)"
          fi
          if [ -z "$cuda_root" ]; then
            echo "Could not determine CUDA root" >&2
            exit 1
          fi
          echo "cuda_root=$cuda_root" >> "$GITHUB_OUTPUT"

      - id: torch-artifact-check
        name: Check built torch wheel presence
        uses: actions/github-script@v8
        with:
          script: |
            const artifactName = '${{ matrix.artifact_name }}';
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              }
            );
            const artifact = artifacts.find((item) => item.name === artifactName);
            core.setOutput('exists', artifact ? 'true' : 'false');

      - name: Download built torch wheel
        if: steps.torch-artifact-check.outputs.exists == 'true'
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-torch

      - name: Fail when built torch wheel is missing
        if: steps.torch-artifact-check.outputs.exists != 'true'
        shell: bash
        run: |
          echo "Missing torch artifact for ${{ matrix.artifact_name }}."
          echo "torchvision cannot be built for this matrix entry without the matching torch wheel."
          exit 1

      - name: Install built torch wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall dist-torch/*.whl

      - name: Clone torchvision source
        shell: bash
        run: |
          git clone \
            --branch "v${{ matrix.torchvision_version }}" \
            --depth 1 \
            https://github.com/pytorch/vision \
            vision-src

      - name: Install torchvision build requirements
        shell: bash
        working-directory: vision-src
        run: |
          pip install "cmake<4" ninja numpy pillow "setuptools<82" wheel

      - name: Trim PATH for Windows CUDA build
        if: matrix.target_os == 'windows' && matrix.backend == 'cuda'
        shell: pwsh
        run: |
          $trimmed = ($env:PATH -split ';' | Select-Object -Unique | Where-Object {
            $_ -ne '' -and
            $_ -notmatch '\\Microsoft Visual Studio\\' -and
            $_ -notmatch '\\MSBuild\\' -and
            $_ -notmatch '\\Common7\\'
          }) -join ';'
          "PATH=$trimmed" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build torchvision wheel (Linux / macOS)
        if: matrix.target_os != 'windows'
        shell: bash
        working-directory: vision-src
        env:
          BUILD_VERSION: ${{ matrix.torchvision_version }}
          PYTORCH_VERSION: ${{ matrix.torch_version }}
          CUDA_HOME: ${{ steps.torchvision_cuda_home.outputs.cuda_root }}
          SETUPTOOLS_USE_DISTUTILS: local
        run: |
          export FORCE_CUDA=0
          export FORCE_MPS=0
          if [ "${{ matrix.backend }}" = "cuda" ]; then
            export FORCE_CUDA=1
          fi
          if [ "${{ matrix.target_os }}" = "macos" ] && [ "${{ matrix.target_arch }}" = "arm64" ] && [ "${{ matrix.backend }}" = "mps" ]; then
            export FORCE_MPS=1
            export MACOSX_DEPLOYMENT_TARGET=11.0
          fi
          if [ "${{ matrix.target_os }}" = "macos" ] && [ "${{ matrix.target_arch }}" = "x86_64" ]; then
            export MACOSX_DEPLOYMENT_TARGET=10.15
          fi
          python setup.py bdist_wheel

      - name: Build torchvision wheel (Windows)
        if: matrix.target_os == 'windows'
        shell: pwsh
        working-directory: vision-src
        env:
          BUILD_VERSION: ${{ matrix.torchvision_version }}
          PYTORCH_VERSION: ${{ matrix.torch_version }}
          DISTUTILS_USE_SDK: "1"
          SETUPTOOLS_USE_DISTUTILS: local
        run: |
          $env:FORCE_CUDA = '0'
          if ('${{ matrix.backend }}' -eq 'cuda') {
            $env:FORCE_CUDA = '1'
            if ($env:CUDA_PATH) {
              $env:CUDA_HOME = $env:CUDA_PATH
            }
          }
          python setup.py bdist_wheel

      - name: Collect built wheel
        shell: bash
        run: |
          mkdir -p dist
          cp vision-src/dist/*.whl dist/
          ls -lh dist/

      - name: Validate built wheel (Linux / macOS)
        if: matrix.target_os != 'windows'
        env:
          BUILD_BACKEND: ${{ matrix.backend }}
        shell: bash
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          pip install --force-reinstall --no-deps "$WHEEL"
          python -c "
          import os, torch, torchvision
          print(f'torchvision version: {torchvision.__version__}')
          boxes = torch.tensor([[0.0, 0.0, 10.0, 10.0], [1.0, 1.0, 9.0, 9.0]])
          scores = torch.tensor([0.9, 0.8])
          keep = torchvision.ops.nms(boxes, scores, 0.5)
          print(f'nms keep: {keep.tolist()}')
          backend = os.environ.get('BUILD_BACKEND', 'cpu')
          if backend == 'cuda':
              cuda_version = torch.ops.torchvision._cuda_version()
              assert cuda_version != -1, 'Expected torchvision CUDA ops to be built'
              print(f'torchvision cuda version: {cuda_version}')
          print('smoke-ok')
          "

      - name: Validate built wheel (Windows)
        if: matrix.target_os == 'windows'
        env:
          BUILD_BACKEND: ${{ matrix.backend }}
        shell: pwsh
        run: |
          $wheel = Get-ChildItem -Path dist -Filter *.whl | Select-Object -First 1
          if (-not $wheel) { throw "No wheel found in dist/" }
          pip install --force-reinstall --no-deps $wheel.FullName
          python -c "
          import os, traceback
          try:
              import torch, torchvision
              print(f'torchvision version: {torchvision.__version__}')
              boxes = torch.tensor([[0.0, 0.0, 10.0, 10.0], [1.0, 1.0, 9.0, 9.0]])
              scores = torch.tensor([0.9, 0.8])
              keep = torchvision.ops.nms(boxes, scores, 0.5)
              print(f'nms keep: {keep.tolist()}')
              if os.environ.get('BUILD_BACKEND', 'cpu') == 'cuda':
                  cuda_version = torch.ops.torchvision._cuda_version()
                  assert cuda_version != -1, 'Expected torchvision CUDA ops to be built'
                  print(f'torchvision cuda version: {cuda_version}')
              print('smoke-ok')
          except Exception:
              traceback.print_exc()
              raise
          "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.torchvision_artifact_name }}
          path: dist/*.whl
          if-no-files-found: error

