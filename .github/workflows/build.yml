        working-directory: audio-src
        env:
          BUILD_VERSION: ${{ matrix.torchaudio_version }}
          CUDA_HOME: ${{ steps.torchaudio_cuda_home.outputs.cuda_root }}
          SETUPTOOLS_USE_DISTUTILS: local
        run: |
          export USE_CUDA=0
          if [ "${{ matrix.backend }}" = "cuda" ]; then
            export USE_CUDA=1
          fi
          python setup.py bdist_wheel

      - name: Build torchaudio wheel (Windows)
        if: matrix.target_os == 'windows'
        shell: pwsh
        working-directory: audio-src
        env:
          BUILD_VERSION: ${{ matrix.torchaudio_version }}
          DISTUTILS_USE_SDK: "1"
          SETUPTOOLS_USE_DISTUTILS: local
        run: |
          $env:USE_CUDA = '0'
          if ('${{ matrix.backend }}' -eq 'cuda') {
            $env:USE_CUDA = '1'
            if ($env:CUDA_PATH) {
              $env:CUDA_HOME = $env:CUDA_PATH
            }
          }
          python setup.py bdist_wheel

      - name: Collect built wheel
        shell: bash
        run: |
          mkdir -p dist
          cp audio-src/dist/*.whl dist/
          ls -lh dist/

      - name: Validate built wheel (Linux / macOS)
        if: matrix.target_os != 'windows'
        env:
          BUILD_BACKEND: ${{ matrix.backend }}
        shell: bash
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          pip install --force-reinstall --no-deps "$WHEEL"
          python -c "
          import os, torch, torchaudio
          print(f'torchaudio version: {torchaudio.__version__}')
          waveform = torch.zeros(1, 16000)
          spec = torchaudio.transforms.MelSpectrogram(sample_rate=16000)(waveform)
          print(f'mel spectrogram shape: {tuple(spec.shape)}')
          if os.environ.get('BUILD_BACKEND', 'cpu') == 'cuda':
              cuda_version = torchaudio._extension._check_cuda_version()
              assert cuda_version is not None, 'Expected torchaudio CUDA build'
              print(f'torchaudio cuda version: {cuda_version}')
          print('smoke-ok')
          "

      - name: Validate built wheel (Windows)
        if: matrix.target_os == 'windows'
        env:
          BUILD_BACKEND: ${{ matrix.backend }}
        shell: pwsh
        run: |
          $wheel = Get-ChildItem -Path dist -Filter *.whl | Select-Object -First 1
          if (-not $wheel) { throw "No wheel found in dist/" }
          pip install --force-reinstall --no-deps $wheel.FullName
          python -c "
          import os, traceback
          try:
              import torch, torchaudio
              print(f'torchaudio version: {torchaudio.__version__}')
              waveform = torch.zeros(1, 16000)
              spec = torchaudio.transforms.MelSpectrogram(sample_rate=16000)(waveform)
              print(f'mel spectrogram shape: {tuple(spec.shape)}')
              if os.environ.get('BUILD_BACKEND', 'cpu') == 'cuda':
                  cuda_version = torchaudio._extension._check_cuda_version()
                  assert cuda_version is not None, 'Expected torchaudio CUDA build'
                  print(f'torchaudio cuda version: {cuda_version}')
              print('smoke-ok')
          except Exception:
              traceback.print_exc()
              raise
          "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.torchaudio_artifact_name }}
          path: dist/*.whl
          if-no-files-found: error

  validate-torchvision-artifacts:
    needs: [check-upstream, build-torchvision]
    if: always() && needs.check-upstream.outputs.should_build == 'true' && needs.check-upstream.outputs.cpu_matrix_has_entries == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check-upstream.outputs.cpu_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - id: artifact-check
        name: Check torchvision wheel artifact presence
        uses: actions/github-script@v8
        with:
          script: |
            const artifactName = '${{ matrix.torchvision_artifact_name }}';
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              }
            );
            const artifact = artifacts.find((item) => item.name === artifactName);
            core.setOutput('exists', artifact ? 'true' : 'false');

      - name: Download built wheel
        if: steps.artifact-check.outputs.exists == 'true'
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.torchvision_artifact_name }}
          path: dist-artifact

      - name: Validate wheel structure
        if: steps.artifact-check.outputs.exists == 'true'
        shell: bash
        run: |
          WHEEL=$(ls dist-artifact/*.whl | head -1)
          python scripts/validate_wheel.py "$WHEEL" \
            --expected-package torchvision \
            --expected-version "${{ matrix.torchvision_version }}"

      - name: Fail when expected artifact is missing
        if: steps.artifact-check.outputs.exists != 'true'
        shell: bash
        run: |
          echo "Missing build artifact for ${{ matrix.torchvision_artifact_name }}."
          echo "A corresponding torchvision matrix job failed before upload."
          exit 1

  validate-torchaudio-artifacts:
    needs: [check-upstream, build-torchaudio]
    if: always() && needs.check-upstream.outputs.should_build == 'true' && needs.check-upstream.outputs.cpu_matrix_has_entries == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check-upstream.outputs.cpu_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - id: artifact-check
        name: Check torchaudio wheel artifact presence
        uses: actions/github-script@v8
        with:
          script: |
            const artifactName = '${{ matrix.torchaudio_artifact_name }}';
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              }
            );
            const artifact = artifacts.find((item) => item.name === artifactName);
            core.setOutput('exists', artifact ? 'true' : 'false');

      - name: Download built wheel
        if: steps.artifact-check.outputs.exists == 'true'
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.torchaudio_artifact_name }}
          path: dist-artifact

      - name: Validate wheel structure
        if: steps.artifact-check.outputs.exists == 'true'
        shell: bash
        run: |
          WHEEL=$(ls dist-artifact/*.whl | head -1)
          python scripts/validate_wheel.py "$WHEEL" \
            --expected-package torchaudio \
            --expected-version "${{ matrix.torchaudio_version }}"

      - name: Fail when expected artifact is missing
        if: steps.artifact-check.outputs.exists != 'true'
        shell: bash
        run: |
          echo "Missing build artifact for ${{ matrix.torchaudio_artifact_name }}."
          echo "A corresponding torchaudio matrix job failed before upload."
          exit 1

  release-cpu:
    if: needs.check-upstream.outputs.should_build == 'true' && needs.check-upstream.outputs.cpu_matrix_has_entries == 'true'
    needs: [check-upstream, validate-artifacts, validate-torchvision-artifacts, validate-torchaudio-artifacts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download CPU artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: '*-cpu'
          merge-multiple: true

      - name: Download MPS artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: '*-mps'
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Restore release plan
        run: |
          printf '%s' '${{ needs.check-upstream.outputs.release_plan_json }}' > release-plan.json
          cat release-plan.json

      - name: Update release state files
        env:
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python scripts/update_release_state.py \
            --plan-file release-plan.json \
            --output-dir release-state \
            --build-source-commit "${{ github.sha }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --workflow-run-url "${GITHUB_RUN_URL}" \
            --repository "${{ github.repository }}" \
            --event-name "${{ github.event_name }}"

      - id: commit-state
        name: Commit release state
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release-state

          if git diff --cached --quiet; then
            echo "release_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Record release state for ${{ needs.check-upstream.outputs.release_tag }}"
          git push origin HEAD:${{ github.ref_name }}
          echo "release_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - id: push-tag
        name: Create and push release tag
        env:
          RELEASE_TAG: ${{ needs.check-upstream.outputs.release_tag }}
          RELEASE_COMMIT_SHA: ${{ steps.commit-state.outputs.release_commit_sha }}
        run: |
          set -euo pipefail

          git fetch --tags --force --prune --prune-tags
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag already exists on origin: ${RELEASE_TAG}"
            echo "tag_name=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            git tag -d "${RELEASE_TAG}"
          fi

          git tag -a "${RELEASE_TAG}" "${RELEASE_COMMIT_SHA}" -m "Release ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"
          echo "tag_name=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.push-tag.outputs.tag_name }}
          name: "PyTorch ${{ needs.check-upstream.outputs.torch_version }} — Source-Built torch, torchvision, and torchaudio Wheels"
          fail_on_unmatched_files: true
          generate_release_notes: false
          body: |
            Source-built **torch ${{ needs.check-upstream.outputs.torch_version }}**, matching torchvision, and matching torchaudio wheels for platforms and Python versions not covered by official PyPI releases.

            ### Package Layout
            - The release tag is shared across the full package family and remains torch-based.
            - `torch`, `torchvision`, and `torchaudio` are published as separate wheel files.
            - Each torchvision and torchaudio wheel is built against the matching torch wheel for the same matrix entry.
            - This workflow publishes CPU and MPS assets first.
            - The follow-up CUDA workflow appends any missing CUDA assets to the same release tag.

            ### Platforms & Backends
            | Platform | Backend |
            |---|---|
            | Linux x86\_64 | CPU |
            | Windows x86\_64 | CPU |
            | macOS x86\_64 (Intel) | CPU |
            | macOS arm64 (Apple Silicon) | MPS (Metal) |

            ### Python Versions
            See attached wheel filenames for the CPU and MPS matrix.

            ### Notes
            - These wheels preserve the normal package split: install `torch`, `torchvision`, and `torchaudio` separately as needed.
            - The torch wheel keeps the same API surface as official PyPI torch wheels.
            - CUDA wheels include compiled CUDA kernels. A physical NVIDIA GPU is required at runtime for GPU acceleration.
            - MPS wheels use Apple Metal for GPU acceleration on Apple Silicon.
            - Torch is built from the official PyTorch source at tag `v${{ needs.check-upstream.outputs.torch_version }}`.
          files: release-assets/*
